name: Build and Deploy HTML

on:
  push:
    branches: [ master ]
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Asciidoctor
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          gem install asciidoctor asciidoctor-diagram

      - name: Build HTML
        run: |
          mkdir -p site
          asciidoctor -r asciidoctor-diagram doc/specification/OpenCRG_specification_1_2.adoc -o site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-latest:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages (latest)
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./release-site

      - name: Copy to version folder
        run: |
          TAG="${GITHUB_REF##*/}"
          mkdir -p "./${TAG}"
          cp -r release-site/* "./${TAG}/"

      - name: Commit and push versioned site
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Add release ${GITHUB_REF##*/}"
          git push
